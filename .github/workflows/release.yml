name: Build & Release Aseprite Extension

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tools/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          VERSION="v0.1.${{ github.run_number }}"
          NUMERIC="${VERSION#v}"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "numeric=$NUMERIC"   >> "$GITHUB_OUTPUT"
          echo "Building $VERSION"

      - name: Patch package.json version
        run: |
          jq --arg v "${{ steps.ver.outputs.numeric }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Build .aseprite-extension
        run: |
          STAGE=$(mktemp -d)
          cp package.json theme.xml sheet.png "$STAGE/"
          [ -f sheet.aseprite-data ] && cp sheet.aseprite-data "$STAGE/" || true
          [ -f LICENSE ] && cp LICENSE "$STAGE/" || true
          [ -f README.md ] && cp README.md "$STAGE/" || true
          OUT="frigus-nox-${{ steps.ver.outputs.version }}.aseprite-extension"
          (cd "$STAGE" && zip -r "$GITHUB_WORKSPACE/$OUT" .)
          ls -la "$OUT"
          unzip -l "$OUT"
          echo "OUT=$OUT" >> "$GITHUB_ENV"

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.version }}" -m "Release ${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body: |
            Aseprite extension built from ${{ github.sha }}.

            **Install:** download the `.aseprite-extension` asset, then in Aseprite go to
            *Edit → Preferences → Extensions → Add Extension* and select the file.
          files: ${{ env.OUT }}
          fail_on_unmatched_files: true
